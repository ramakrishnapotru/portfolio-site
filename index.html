<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Weather Dashboard</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>
            Weather Dashboard
        </h1>

        <!-- SEARCH BOX -->

        <div class="search-box">

            <input
            type="text"
            id="cityInput"
            placeholder="Enter city name">

            <button id="searchBtn">
                Search
            </button>

        </div>

        <!-- WEATHER RESULT -->

        <div id="weatherResult">

            <h2 id="cityName"></h2>

            <p id="temperature"></p>

            <p id="humidity"></p>

            <p id="windSpeed"></p>

            <p id="weatherCondition"></p>

        </div>

        <!-- ERROR MESSAGE -->

        <p id="errorMessage"></p>

    </div>

    <script src="script.js"></script>

</body>

</html>
